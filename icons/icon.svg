<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB6C9"/>
      <stop offset="100%" style="stop-color:#F06292"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF5F5"/>
      <stop offset="100%" style="stop-color:#FFE4E8"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- 装饰圆点 -->
  <circle cx="100" cy="120" r="18" fill="rgba(255,255,255,0.15)"/>
  <circle cx="420" cy="380" r="24" fill="rgba(255,255,255,0.1)"/>
  <circle cx="400" cy="100" r="12" fill="rgba(255,255,255,0.12)"/>
  <circle cx="130" cy="400" r="14" fill="rgba(255,255,255,0.08)"/>
  <!-- 心心相印 - 大心 -->
  <g transform="translate(256,240)">
    <path d="M0-40 C-20-80,-100-60,-100-20 C-100,30,0,90,0,120 C0,90,100,30,100-20 C100-60,20-80,0-40Z"
          fill="url(#heart)" opacity="0.95"/>
    <!-- 小高光 -->
    <path d="M-30-15 C-40-35,-75-30,-75-10 C-75,15,-30,50,-20,60"
          fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- 小爱心飘浮 -->
  <g fill="rgba(255,255,255,0.3)" transform="translate(256,256)">
    <text x="-80" y="-100" font-size="24" text-anchor="middle" fill="rgba(255,255,255,0.2)">♥</text>
    <text x="90" y="-80" font-size="18" text-anchor="middle" fill="rgba(255,255,255,0.15)">♥</text>
    <text x="-70" y="120" font-size="16" text-anchor="middle" fill="rgba(255,255,255,0.12)">♥</text>
    <text x="85" y="110" font-size="20" text-anchor="middle" fill="rgba(255,255,255,0.18)">♥</text>
  </g>
  <!-- 底部文字 -->
  <text x="256" y="430" font-family="sans-serif" font-size="36" font-weight="bold"
        text-anchor="middle" fill="rgba(255,255,255,0.9)" letter-spacing="3">时间胶囊</text>
</svg>
